name = "amber"
version = "1.1.0"
gleam = ">= 1.14.0"
description = "✨🦕 Deno Bindings For Gleam 🧡"
licences = ["Apache-2.0"]
repository = { type = "github", user = "han-tyumi", repo = "amber" }

target = "javascript"

[javascript]
runtime = "deno"
typescript_declarations = true

[javascript.deno]
allow_read = true
allow_write = true
allow_run = true
allow_sys = true
allow_net = true

[dependencies]
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
gossamer = ">= 4.0.1 and < 5.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
