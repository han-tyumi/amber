# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    gleam-check:
      glob: "*.gleam"
      run: gleam check

    gleam-format:
      glob: "*.gleam"
      run: gleam format {staged_files}
      stage_fixed: true

    # TODO(@han-tyumi): Currently broken.
    # Gleam seems to output incorrect type declarations for both gleam/iterator
    # and web/iterator.
    # gleam/iterator is missing Action$ and web/iterator's Iterator sometimes
    # has its type parameters swapped around.
    # deno-check:
    #   glob: "*.ts"
    #   run: deno check {staged_files}

    deno-lint:
      glob: "*.ts"
      run: deno lint {staged_files}

    deno-format:
      glob: "*.{ts,md,json,yml}"
      run: deno fmt {staged_files}
      stage_fixed: true

    test:
      glob: "*.{gleam,ts}"
      run: just test
